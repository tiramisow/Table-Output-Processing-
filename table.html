<!DOCTYPE html>
<html>

<head>
    <title>Assignment</title>
</head>

<body>

    <h2>Table 1</h2>
    <table border="1" id="table1">
        <tr>
            <th>Index</th>
            <th>Value</th>
        </tr>
    </table>

    <h2>Table 2</h2>
    <table border="1" id="table2">
        <tr>
            <th>Category</th>
            <th>Value</th>
        </tr>
    </table>

    <script>
        fetch('Table_Input.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.trim().split('\n');

                let values = [];

                for (let i = 1; i < rows.length; i++) {
                    const [index, value] = rows[i].split(',');
                    values.push(Number(value));
                    const row = document.createElement("tr");
                    row.innerHTML = `<td>${index}</td><td>${value}</td>`;
                    document.getElementById("table1").appendChild(row);
                }

                const get = (i) => values[i - 1] || 0;

                const A5 = get(5);
                const A20 = get(20);
                const A15 = get(15);
                const A7 = get(7);
                const A13 = get(13);
                const A12 = get(12);

                const results = [
                    { name: "Alpha", value: A5 + A20 },
                    { name: "Beta", value: A15 / A7 },
                    { name: "Charlie", value: A13 * A12 }
                ];

                results.forEach(r => {
                    const row = document.createElement("tr");
                    row.innerHTML = `<td>${r.name}</td><td>${r.value}</td>`;
                    document.getElementById("table2").appendChild(row);
                });

            });
    </script>
</body>

</html>
